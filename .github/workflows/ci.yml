name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  UV_VERSION: "0.11.28"

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.14"
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run ty check

  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked
      - run: uv run -m pytest -v --cov=fastapi_request_observability --cov-branch

  minimum-fastapi:
    name: Minimum FastAPI
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.13"
          enable-cache: true
      - name: Test declared FastAPI floor
        run: >-
          uv run --isolated --with-editable . --with fastapi==0.139.0
          --with pytest --with pytest-asyncio --with pytest-cov --with httpx2
          -m pytest -v --cov=fastapi_request_observability --cov-branch

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.14"
          enable-cache: true
      - run: uv build --no-sources
      - name: Inspect distribution contents
        run: python tests/check_distribution.py
      - name: Smoke-test wheel
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py
      - name: Smoke-test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py
