name: Release

on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

env:
  UV_VERSION: "0.11.28"

jobs:
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write # Required for PyPI trusted publishing; no repository token is used.
    steps:
      - name: Check out release tag
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0
          persist-credentials: false
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: "3.14"
          enable-cache: false
      - name: Verify tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib

          with open("pyproject.toml", "rb") as file:
              version = tomllib.load(file)["project"]["version"]
          expected = f"v{version}"
          actual = os.environ["RELEASE_TAG"]
          if actual != expected:
              raise SystemExit(f"release tag {actual!r} must equal {expected!r}")
          PY
      - name: Verify release commit belongs to main
        run: git merge-base --is-ancestor HEAD origin/main
      - run: uv build --no-sources
      - name: Inspect distribution contents
        run: python tests/check_distribution.py
      - name: Smoke-test wheel
        run: uv run --isolated --no-project --with dist/*.whl tests/smoke_test.py
      - name: Smoke-test source distribution
        run: uv run --isolated --no-project --with dist/*.tar.gz tests/smoke_test.py
      - name: Record distribution hashes
        run: sha256sum dist/*
      - name: Publish to PyPI with trusted publishing
        run: uv publish --trusted-publishing always
